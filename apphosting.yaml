# Firebase App Hosting configuration.
# Node version is controlled by package.json -> engines.node.
scripts:
  buildCommand: npm run build
  runCommand: npm run start
env:
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME
  - variable: FIREBASE_PROJECT_ID
    value: project-path-00
  - variable: FIREBASE_CLIENT_EMAIL
    value: firebase-adminsdk-fbsvc@project-path-00.iam.gserviceaccount.com
  - variable: FIREBASE_STORAGE_BUCKET
    value: project-path-00.firebasestorage.app
  - variable: FIREBASE_DATABASE_ID
    value: "(default)"
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyArhE2_jFfNwucv2zfSrux2Q_0QruRD31I
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: project-path-00.firebaseapp.com
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: project-path-00
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: project-path-00.firebasestorage.app
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "1090458668147"
